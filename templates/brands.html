{% extends "base.html" %}
{% block title %}무드 브랜드 매니저 — AI Music Factory{% endblock %}
{% block content %}

<div style="text-align:center; margin-bottom:28px">
    <h1 style="font-size:26px; font-weight:900; margin-bottom:6px; background:linear-gradient(135deg,#ff6b9d,#c4a7ff,#fab387); -webkit-background-clip:text; -webkit-text-fill-color:transparent">
        AI Music Factory — 무드 브랜드 매니저
    </h1>
    <p class="text-sm text-muted">검색으로 브랜드를 탐색하고, 슬롯에 넣고 빼면서 채널 에셋을 관리하세요</p>
</div>

<div style="display:grid; grid-template-columns:300px 1fr; gap:20px; align-items:start">
    <!-- 슬롯 패널 -->
    <div id="slot-panel" style="position:sticky; top:72px; background:#0d0d14; border:1px solid #222; border-radius:14px; padding:18px">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px">
            <div style="font-size:15px; font-weight:800">채널 에셋 슬롯</div>
            <div id="slot-counter" style="font-size:11px; padding:3px 10px; border-radius:12px; background:#ffffff08; color:#666; border:1px solid #333">0/3</div>
        </div>
        <div id="slot-list" style="display:flex; flex-direction:column; gap:8px"></div>
        <button id="btn-confirm" style="display:none; width:100%; margin-top:14px; padding:12px 0; background:linear-gradient(135deg,#ff6b9d,#c4a7ff); color:#000; border:none; border-radius:10px; cursor:pointer; font-size:14px; font-weight:800; letter-spacing:0.5px">
            확정 & 프리셋 저장
        </button>
    </div>

    <!-- 브랜드 목록 -->
    <div>
        <div style="position:relative; margin-bottom:20px">
            <div style="position:absolute; left:16px; top:50%; transform:translateY(-50%); font-size:18px; opacity:0.5; pointer-events:none">🔍</div>
            <input id="brand-search" placeholder="브랜드 검색... (장르, 무드, 키워드, 악기 등)"
                style="width:100%; padding:14px 16px 14px 48px; font-size:15px; background:#111118; border:1px solid #2a2a35; border-radius:12px; color:#e8e6e3; outline:none; box-sizing:border-box; transition:border-color 0.2s">
            <div id="search-count" style="position:absolute; right:16px; top:50%; transform:translateY(-50%); font-size:12px; color:#888; display:none"></div>
        </div>
        <div id="brand-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px"></div>
    </div>
</div>

{% endblock %}

    searchTags:["영화","OST","시네마틱","오케스트라","드라마","감동","에픽","스코어"]
  },
  {
    id:"weekend_chill", name:"위켄드 칠", subtitle:"Weekend Chill", emoji:"☀️",

    target:"25~35세 라이프스타일 소비자, SNS 감성 사진 시청자",
    viralReason:"주말/휴일 플리 수요 꾸준. '홈카페', '브런치 음악', '테라스 BGM' 니치 성장. 인스타 릴스 BGM 수요.",
    allowed:{genres:["트로피컬 하우스","인디 R&B","소프트 일렉트로닉팝","네오소울","라운지"],moods:["여유로운","활기찬","세련된","따스한","그루비"],tempoRange:"90~120 BPM",instruments:["마림바","트로피컬 퍼커션","일렉 피아노","핑거 베이스","스틸드럼"],vocal:"가벼운 팝 보컬 / 인스트루멘탈"},
    forbidden:{genres:["발라드","메탈","다크앰비언트","클래식","트로트"],moods:["우울한","어두운","무거운","비장한"],notes:"마이너키 2곡 연속 금지. BPM 70 이하 금지. 느린 피아노 솔로 금지."},
    seasonFit:"봄~가을 (여름 피크)", colorScheme:{primary:"#1a1510",secondary:"#2d2518",accent:"#ff8a5c"},
    competitorGap:"'주말 감성 플리'는 한국어권에서 수요 대비 공급 부족. 특히 오리지널 곡은 거의 없음.",
    searchTags:["주말","브런치","홈파티","여유","트로피컬","칵테일","테라스","여름"]
  },
  {
    id:"after_work_soju", name:"퇴근 후 한잔", subtitle:"After Work Soju", emoji:"🍺",
    tagline:"오늘도 수고했어, 나 자신",
    description:"퇴근길~혼술/혼밥 시간의 위로 플리. 한국 인디, 감성 팝, 어쿠스틱 R&B로 하루를 마무리.",
    target:"25~40세 직장인 (남녀 모두), 퇴근 후 감성 충전 시청자",
    viralReason:"'퇴근 후 위로 플리', '혼술 감성' 키워드 2025년 신규 트렌드로 부상. 직장인 공감 콘텐츠 폭증.",
    allowed:{genres:["한국 인디","어쿠스틱 팝","시티 R&B","소프트 록","블루스팝"],moods:["위로","나른한","쓸쓸한","따뜻한","공감적","회고적"],tempoRange:"70~105 BPM",instruments:["어쿠스틱 기타","일렉 피아노","브러시 드럼","베이스","하모니카"],vocal:"감성 보컬 (한국어 느낌) / 인스트루멘탈"},
    forbidden:{genres:["EDM","메탈","클래식","뉴에이지","아이돌팝"],moods:["밝고 경쾌","웅장한","파워풀","동화적"],notes:"오케스트라 금지. BPM 110 이상 금지. 하이톤 보컬 금지."},
    seasonFit:"사계절 (가을/겨울 피크)", colorScheme:{primary:"#1a1520",secondary:"#2d2535",accent:"#f0a050"},
    competitorGap:"'퇴근 후' 특화 플리 거의 없음. 한국 직장인 공감 감성 + AI 오리지널 = 강력한 포지셔닝.",
    searchTags:["퇴근","혼술","위로","직장인","인디","한잔","감성","어쿠스틱"]
  }
];

let slots = [];
let expandedId = null;

function renderAll() {
    renderSlots();
    renderBrands();
}

function renderSlots() {
    const list = document.getElementById('slot-list');
    const counter = document.getElementById('slot-counter');
    counter.textContent = `${slots.length}/3`;
    counter.style.background = slots.length === 3 ? '#4ade8020' : '#ffffff08';
    counter.style.color = slots.length === 3 ? '#4ade80' : '#666';
    counter.style.borderColor = slots.length === 3 ? '#4ade8040' : '#333';

    let html = '';
    for (let i = 0; i < 3; i++) {
        const brandId = slots[i];
        const brand = MOOD_BRANDS.find(b => b.id === brandId);
        if (!brand) {
            html += `<div style="border:2px dashed #2a2a35; border-radius:10px; padding:14px 16px; text-align:center; color:#444; font-size:12px">
                SLOT ${i+1} — 아래에서 브랜드를 선택하세요
            </div>`;
        } else {
            html += `<div draggable="true" data-slot="${i}" style="display:flex; align-items:center; gap:10px;
                background:linear-gradient(135deg,${brand.colorScheme.primary},${brand.colorScheme.secondary});
                border:1px solid ${brand.colorScheme.accent}50; border-radius:10px; padding:10px 14px; cursor:grab">
                <div style="color:#555; font-size:14px; cursor:grab; user-select:none">⠿</div>
                <div style="font-size:20px">${brand.emoji}</div>
                <div style="flex:1">
                    <div style="font-size:13px; font-weight:700">${brand.name}</div>
                    <div style="font-size:10px; color:${brand.colorScheme.accent}">${brand.tagline}</div>
                </div>
                <button onclick="removeSlot('${brand.id}')" style="background:rgba(255,85,85,0.15); border:1px solid #ff555540;
                    color:#ff5555; width:26px; height:26px; border-radius:6px; cursor:pointer; font-size:13px;
                    display:flex; align-items:center; justify-content:center">✕</button>
            </div>`;
        }
    }
    list.innerHTML = html;

    // 드래그 & 드롭
    list.querySelectorAll('[draggable]').forEach(el => {
        el.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', el.dataset.slot); el.style.opacity='0.5'; });
        el.addEventListener('dragend', e => { el.style.opacity='1'; });
        el.addEventListener('dragover', e => e.preventDefault());
        el.addEventListener('drop', e => {
            e.preventDefault();
            const from = parseInt(e.dataTransfer.getData('text/plain'));
            const to = parseInt(el.dataset.slot);
            if (!isNaN(from) && !isNaN(to) && from !== to && slots[from] && slots[to]) {
                [slots[from], slots[to]] = [slots[to], slots[from]];
                renderAll();
            }
        });
    });

    // 확정 버튼
    document.getElementById('btn-confirm').style.display = slots.length === 3 ? '' : 'none';
}

function renderBrands() {
    const query = document.getElementById('brand-search').value.toLowerCase().trim();
    const searchCount = document.getElementById('search-count');

    const filtered = MOOD_BRANDS.filter(b => {
        if (!query) return true;
        const hay = [b.name, b.subtitle, b.tagline, b.description,
            ...b.allowed.genres, ...b.allowed.moods, ...b.allowed.instruments,
            b.allowed.vocal, ...b.forbidden.genres, ...b.forbidden.moods,
            b.target, b.seasonFit, b.competitorGap, ...b.searchTags
        ].join(' ').toLowerCase();
        return query.split(/\s+/).every(w => hay.includes(w));
    });

    if (query) {
        searchCount.style.display = '';
        searchCount.textContent = `${filtered.length}/${MOOD_BRANDS.length} 매칭`;
    } else {
        searchCount.style.display = 'none';
    }

    const grid = document.getElementById('brand-grid');
    if (query && filtered.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px 0; color:#555; font-size:14px">"${query}"에 매칭되는 브랜드가 없습니다</div>`;
        return;
    }

    grid.innerHTML = filtered.map(b => {
        const isInSlot = slots.includes(b.id);
        const slotIdx = slots.indexOf(b.id);
        const disabled = slots.length >= 3 && !isInSlot;
        const isExp = expandedId === b.id;

        return `<div style="grid-column:${isExp ? '1/-1' : 'auto'};
            background:${isInSlot ? `linear-gradient(145deg,${b.colorScheme.primary},${b.colorScheme.secondary})` : '#111118'};
            border:2px solid ${isInSlot ? b.colorScheme.accent : '#1e1e28'};
            border-radius:14px; padding:16px 18px; cursor:${disabled ? 'not-allowed' : 'pointer'};
            opacity:${disabled ? '0.35' : '1'}; transition:all 0.25s; position:relative; overflow:hidden">

            ${isInSlot ? `<div style="position:absolute; top:0; right:0; padding:4px 12px;
                background:${b.colorScheme.accent}; color:#000; font-size:10px; font-weight:900;
                border-radius:0 0 0 10px; letter-spacing:1px">SLOT ${slotIdx+1}</div>` : ''}

            <div onclick="${disabled ? '' : `toggleSlot('${b.id}')`}" style="display:flex; gap:12px; align-items:center">
                <div style="width:44px; height:44px; border-radius:12px;
                    background:${isInSlot ? b.colorScheme.accent : '#1a1a25'};
                    display:flex; align-items:center; justify-content:center;
                    font-size:${isInSlot ? '18' : '22'}px; font-weight:800; flex-shrink:0;
                    color:${isInSlot ? '#000' : '#fff'}; transition:all 0.2s">
                    ${isInSlot ? '✓' : b.emoji}
                </div>
                <div style="flex:1; min-width:0">
                    <div style="font-size:16px; font-weight:700; display:flex; align-items:center; gap:6px">
                        ${b.name}
                        <span style="font-size:11px; color:#666; font-weight:400">${b.subtitle}</span>
                    </div>
                    <div style="font-size:12px; color:${isInSlot ? b.colorScheme.accent : '#888'}; margin-top:2px">${b.tagline}</div>
                </div>
            </div>

            <p style="font-size:12px; color:#999; line-height:1.6; margin:10px 0 8px">${b.description}</p>

            <div style="display:flex; gap:5px; flex-wrap:wrap">
                ${b.allowed.genres.slice(0,3).map(g => `<span style="padding:2px 7px; border-radius:8px; font-size:10px;
                    background:${isInSlot ? b.colorScheme.accent+'20' : '#1a1a25'};
                    color:${isInSlot ? b.colorScheme.accent : '#666'};
                    border:1px solid ${isInSlot ? b.colorScheme.accent+'30' : '#252530'}">${g}</span>`).join('')}
                <span style="padding:2px 7px; border-radius:8px; font-size:10px; background:#1a1a25; color:#555">${b.allowed.tempoRange}</span>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px">
                <span style="font-size:10px; color:#555">🎯 ${b.target.split(',')[0]} · 📅 ${b.seasonFit.split('(')[0]}</span>
                <button onclick="event.stopPropagation(); toggleExpand('${b.id}')" style="background:none; border:1px solid #333;
                    color:#777; padding:2px 8px; border-radius:5px; cursor:pointer; font-size:10px">${isExp ? '접기' : '상세'}</button>
            </div>

            ${isExp ? `<div style="margin-top:14px; padding:14px; background:rgba(0,0,0,0.35); border-radius:10px; font-size:11px; line-height:1.8">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px">
                    <div>
                        <div style="color:#4ade80; font-weight:700; margin-bottom:4px">✅ 허용</div>
                        <div><b>장르:</b> ${b.allowed.genres.join(', ')}</div>
                        <div><b>무드:</b> ${b.allowed.moods.join(', ')}</div>
                        <div><b>템포:</b> ${b.allowed.tempoRange}</div>
                        <div><b>악기:</b> ${b.allowed.instruments.join(', ')}</div>
                        <div><b>보컬:</b> ${b.allowed.vocal}</div>
                    </div>
                    <div>
                        <div style="color:#ff5555; font-weight:700; margin-bottom:4px">🚫 금지</div>
                        <div><b>장르:</b> ${b.forbidden.genres.join(', ')}</div>
                        <div><b>무드:</b> ${b.forbidden.moods.join(', ')}</div>
                        <div style="color:#ff8888; margin-top:4px; font-style:italic">${b.forbidden.notes}</div>
                    </div>
                </div>
                <div style="margin-top:10px; padding:8px 10px; background:rgba(255,255,255,0.03); border-radius:6px">
                    <div><b>📈 바이럴:</b> ${b.viralReason}</div>
                    <div style="margin-top:3px"><b style="color:#4ade80">💡 차별화:</b> ${b.competitorGap}</div>
                </div>
            </div>` : ''}
        </div>`;
    }).join('');
}

function toggleSlot(id) {
    if (slots.includes(id)) {
        slots = slots.filter(x => x !== id);
    } else if (slots.length < 3) {
        slots.push(id);
    }
    renderAll();
}

function removeSlot(id) {
    slots = slots.filter(x => x !== id);
    renderAll();
}

function toggleExpand(id) {
    expandedId = expandedId === id ? null : id;
    renderBrands();
}

// 확정 버튼 — 서버에 프리셋으로 저장
document.getElementById('btn-confirm').addEventListener('click', async () => {
    const selected = slots.map(id => MOOD_BRANDS.find(b => b.id === id));
    const profiles = selected.map(b => ({
        id: b.id, name: b.name, subtitle: b.subtitle, emoji: b.emoji,
        tagline: b.tagline, description: b.description,
        target_audience: b.target, season_fit: b.seasonFit,
        allowed: b.allowed, forbidden: b.forbidden,
        color_scheme: b.colorScheme, competitor_gap: b.competitorGap
    }));

    const resp = await api('/api/brand-profiles', {
        method: 'POST',
        body: JSON.stringify({ profiles }),
    });

    if (resp.status === 'saved') {
        alert(`채널 프로필 저장 완료!\n\n${selected.map((b,i) => `${i+1}. ${b.emoji} ${b.name}`).join('\n')}\n\n새 작업 페이지에서 브랜드 기반 생성이 가능합니다.`);
    } else {
        alert('저장 실패: ' + (resp.error || ''));
    }
});

// 검색
document.getElementById('brand-search').addEventListener('input', renderBrands);
document.getElementById('brand-search').addEventListener('focus', e => e.target.style.borderColor = '#fab387');
document.getElementById('brand-search').addEventListener('blur', e => e.target.style.borderColor = '#2a2a35');

// 초기 렌더링
renderAll();
</script>
{% endblock %}
